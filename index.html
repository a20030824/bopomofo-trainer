<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="以正式句法、常用度與本機學習紀錄產生題目的注音鍵盤訓練雛型。"
    />
    <link rel="stylesheet" href="/src/app/utterance.css" />
    <title>注音輸入訓練器</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem("bopomofo-trainer.theme.v1") === "dark") {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (error) {
          // Storage may be blocked; default light theme still applies.
        }
      })();
    </script>
  </head>
  <body>
    <textarea
      id="keyboard-capture"
      class="keyboard-capture"
      aria-label="注音鍵盤輸入區"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>
    <div id="app"></div>
    <script type="module" src="/src/app/browser.ts"></script>
  </body>
</html>
