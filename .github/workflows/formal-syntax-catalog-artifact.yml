name: formal-syntax-catalog-artifact

on:
  pull_request:
    paths:
      - .github/workflows/formal-syntax-catalog-artifact.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build current-catalog formal syntax artifacts
        run: npm run grammar:formal-syntax-coverage
      - name: Verify catalog, closure, and artifact contracts
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, stat } from "node:fs/promises";

          const profilesPath = "data/grammar/formal-syntax-current-catalog-profiles.json";
          const coveragePath = "data/grammar/formal-syntax-current-catalog-coverage.json";
          const profiles = JSON.parse(await readFile(profilesPath, "utf8"));
          const coverage = JSON.parse(await readFile(coveragePath, "utf8"));
          if (profiles.schemaVersion !== "formal-syntax-profiles-v1") throw new Error("unexpected profile schema");
          if (coverage.schemaVersion !== "formal-syntax-coverage-v1") throw new Error("unexpected coverage schema");
          if (profiles.catalogEntryCount !== 322) throw new Error(`expected 322 entries, found ${profiles.catalogEntryCount}`);
          if (coverage.catalogEntrySyntaxCoverage.catalogEntryCount !== 322) throw new Error("coverage catalog mismatch");
          const shape = coverage.derivationShapeCountByBound[0];
          if (!shape?.complete || shape.count !== "393809961105380") {
            throw new Error(`unexpected complete shape count: ${JSON.stringify(shape)}`);
          }
          if (coverage.uposCoverage.missingLexicalPositions.length !== 0) {
            throw new Error(`missing UPOS positions: ${coverage.uposCoverage.missingLexicalPositions.join(",")}`);
          }
          console.log(JSON.stringify({
            profileCount: profiles.profileCount,
            noUdEvidenceEntryCount: profiles.noUdEvidenceEntryCount,
            unrealizableProfileCount: coverage.unrealizableProfileCount,
            writtenFormWithMultipleReadingsCount: coverage.readingVariantCoverage.writtenFormWithMultipleReadingsCount,
            readingVariantEntryCount: coverage.readingVariantCoverage.readingVariantEntryCount,
            fullyProfiledWrittenFormCount: coverage.readingVariantCoverage.fullyProfiledWrittenFormCount,
            profileBytes: (await stat(profilesPath)).size,
            coverageBytes: (await stat(coveragePath)).size,
            shapeCount: shape.count,
          }));
          NODE
      - name: Commit generated current-catalog artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            data/grammar/formal-syntax-current-catalog-profiles.json \
            data/grammar/formal-syntax-current-catalog-coverage.json
          git commit -m "Build current catalog syntax coverage"
          git push origin "HEAD:${{ github.head_ref }}"
