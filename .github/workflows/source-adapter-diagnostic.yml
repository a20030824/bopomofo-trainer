name: source-adapter-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  source-adapters:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Source adapter tests
        id: source_adapters
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests/python -p "test_*.py" 2>&1 | tee source-adapter.log
      - name: Upload source adapter log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-adapter-diagnostic-log
          path: source-adapter.log
