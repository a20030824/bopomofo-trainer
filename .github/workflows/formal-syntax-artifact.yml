name: formal-syntax-artifact

on:
  pull_request:
    paths:
      - .github/workflows/formal-syntax-artifact.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Use deterministic compact JSON output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/ud_grammar_evidence/common.py")
          text = path.read_text(encoding="utf-8")
          source = 'json.dump(payload, destination, ensure_ascii=False, indent=2)'
          replacement = 'json.dump(payload, destination, ensure_ascii=False, separators=(",", ":"))'
          if source not in text:
              raise SystemExit("expected pretty JSON writer was not found")
          path.write_text(text.replace(source, replacement), encoding="utf-8", newline="\n")
          PY
      - name: Download pinned UD Chinese GSD r2.18 files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/external/ud/chinese-gsd/r2.18
          base=https://raw.githubusercontent.com/UniversalDependencies/UD_Chinese-GSD/r2.18
          curl --fail --location --retry 3 --output data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-train.conllu "$base/zh_gsd-ud-train.conllu"
          curl --fail --location --retry 3 --output data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-dev.conllu "$base/zh_gsd-ud-dev.conllu"
          curl --fail --location --retry 3 --output data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-test.conllu "$base/zh_gsd-ud-test.conllu"
          cat <<'CHECKSUMS' | sha256sum --check --strict
          de36e605a4786edb00097165cfc0ee425ab668a2dfc1da7ce4652ba4d2585b1e  data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-train.conllu
          09374c8361400861a536ae94a1d7710e1cdd72285c32b9764d94d2d956b4ae02  data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-dev.conllu
          ff01a3d01d62b623756396085e78bdaeefb7c2b7935a890dde5b18e92712d54f  data/external/ud/chinese-gsd/r2.18/zh_gsd-ud-test.conllu
          CHECKSUMS
      - name: Regenerate v2 syntax evidence
        run: python scripts/project-ud-grammar-evidence.py
      - name: Verify locked aggregate counts and schema
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence_path = Path("data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-evidence.json")
          coverage_path = Path("data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-coverage.json")
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          coverage = json.loads(coverage_path.read_text(encoding="utf-8"))
          assert evidence["schemaVersion"] == "ud-syntax-evidence-v2"
          assert coverage["schemaVersion"] == "ud-syntax-evidence-v2"
          assert coverage["observedCandidateCount"] == 942
          assert coverage["unseenCandidateCount"] == 58
          assert coverage["matchedOccurrenceCount"] == 52938
          assert coverage["reviewCandidateCount"] == 403
          assert all((not row["observed"]) or row.get("syntaxProfileEvidence") for row in evidence["rows"])
          assert evidence_path.stat().st_size < 20_000_000
          print(evidence["determinismDigest"])
          print(coverage["determinismDigest"])
          PY
      - name: Commit regenerated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/ud_grammar_evidence/common.py \
            data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-evidence.json \
            data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-coverage.json
          git commit -m "Regenerate UD syntax evidence v2"
          git push origin "HEAD:${{ github.head_ref }}"
      - name: Upload regenerated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formal-syntax-v2-artifacts
          path: |
            data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-evidence.json
            data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-coverage.json
          if-no-files-found: error
          retention-days: 1
