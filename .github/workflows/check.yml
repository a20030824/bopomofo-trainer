name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_research:
        description: Run the archived relational research suite
        required: false
        default: false
        type: boolean

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript failure log
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure-log
          path: typecheck.log
      - name: Capture regenerated active-catalog lock
        shell: bash
        run: |
          sha256sum data/commonness/naer-1141208-active-catalog-rows.json | tee active-catalog.sha256
          git diff -- data/commonness/naer-1141208-active-catalog-rows.json > active-catalog.diff
      - name: Upload regenerated active-catalog lock
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-active-catalog-lock
          path: |
            data/commonness/naer-1141208-active-catalog-rows.json
            active-catalog.sha256
            active-catalog.diff
      - name: Fast tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:fast -- --reporter=verbose 2>&1 | tee vitest.log
      - name: Upload Vitest failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-failure-log
          path: vitest.log
      - name: Source adapter tests
        run: npm run test:source-adapters
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Production build
        run: npm run build

  research:
    if: github.event_name == 'workflow_dispatch' && inputs.run_research
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Run archived research verification
        run: npm run check:research
