name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript failure log
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure-log
          path: typecheck.log
      - name: Fast tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npx vitest run --exclude 'tests/simulation/**' --reporter=verbose 2>&1 | tee vitest.log
      - name: Upload Vitest failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-failure-log
          path: vitest.log
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Production build
        run: npm run build

  research:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts
      - name: Simulation tests
        run: npx vitest run tests/simulation --reporter=verbose --testTimeout=15000
      - name: Analyze relational catalog
        run: npm run catalog:relations
      - name: Verify relational integration replay
        run: npm run integration:research
      - name: Verify relational strategy matrix
        run: npm run strategy:matrix
      - name: Verify seeded cohort experiments
        id: experiments
        shell: bash
        run: |
          set -o pipefail
          npm run experiment:relational 2>&1 | tee experiment.log
      - name: Upload experiment failure log
        if: failure() && steps.experiments.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: experiment-failure-log
          path: experiment.log
      - name: Verify relational strategy analysis
        run: npm run analysis:relational -- --output-dir analysis-artifacts
      - name: Upload relational strategy analysis
        uses: actions/upload-artifact@v4
        with:
          name: relational-strategy-analysis
          path: analysis-artifacts
      - name: Verify relational candidate confirmation
        id: confirmation
        shell: bash
        run: |
          set -o pipefail
          npm run confirmation:relational -- --output-dir confirmation-artifacts 2>&1 | tee confirmation.log
      - name: Upload confirmation failure log
        if: failure() && steps.confirmation.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: confirmation-failure-log
          path: confirmation.log
      - name: Upload relational candidate confirmation
        if: steps.confirmation.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: relational-candidate-confirmation
          path: confirmation-artifacts
