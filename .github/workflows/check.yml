name: check

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test -- --reporter=verbose 2>&1 | tee vitest.log
      - name: Upload Vitest failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-failure-log
          path: vitest.log
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Analyze relational catalog
        run: npm run catalog:relations
      - name: Production build
        run: npm run build
