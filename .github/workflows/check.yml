name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_research:
        description: Run the archived relational research suite
        required: false
        default: false
        type: boolean

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Migrate formal syntax artifacts to versioned paths
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/formal-syntax-system'
        shell: bash
        run: |
          set -euo pipefail
          old_evidence='data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-evidence.json'
          old_coverage='data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-coverage.json'
          new_evidence='data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-syntax-evidence-v2.json'
          new_coverage='data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-syntax-coverage-v2.json'
          if [[ -f "$new_evidence" && -f "$new_coverage" ]]; then
            exit 0
          fi
          cp "$old_evidence" /tmp/formal-syntax-evidence-v2.json
          cp "$old_coverage" /tmp/formal-syntax-coverage-v2.json
          git fetch origin main agent/formal-syntax-system
          git switch -C agent/formal-syntax-system origin/agent/formal-syntax-system
          git show origin/main:"$old_evidence" > "$old_evidence"
          git show origin/main:"$old_coverage" > "$old_coverage"
          cp /tmp/formal-syntax-evidence-v2.json "$new_evidence"
          cp /tmp/formal-syntax-coverage-v2.json "$new_coverage"
          python - <<'PY'
          from pathlib import Path

          old_evidence = "data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-evidence.json"
          old_coverage = "data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-coverage.json"
          new_evidence = "data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-syntax-evidence-v2.json"
          new_coverage = "data/grammar/ud-chinese-gsd-r2.18-naer-top-1000-syntax-coverage-v2.json"
          replacements = {
              Path("scripts/ud_grammar_evidence/common.py"): (
                  (old_evidence, new_evidence),
                  (old_coverage, new_coverage),
              ),
              Path("scripts/build-formal-syntax-coverage.ts"): (
                  (old_evidence, new_evidence),
              ),
              Path("docs/reference-sources/ud-chinese-gsd-naer-top-1000-grammar-evidence.md"): (
                  (old_evidence, new_evidence),
                  (old_coverage, new_coverage),
              ),
              Path("docs/formal-syntax-system.md"): (
                  (old_evidence, new_evidence),
                  (old_coverage, new_coverage),
              ),
          }
          for path, pairs in replacements.items():
              source = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  source = source.replace(old, new)
              path.write_text(source, encoding="utf-8", newline="\n")
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$old_evidence" "$old_coverage" "$new_evidence" "$new_coverage" \
            scripts/ud_grammar_evidence/common.py \
            scripts/build-formal-syntax-coverage.ts \
            docs/reference-sources/ud-chinese-gsd-naer-top-1000-grammar-evidence.md \
            docs/formal-syntax-system.md
          git commit -m 'Separate formal syntax v2 evidence artifacts'
          git push origin HEAD:agent/formal-syntax-system
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript failure log
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure-log
          path: typecheck.log
      - name: Fast tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:fast -- --reporter=verbose 2>&1 | tee vitest.log
      - name: Upload Vitest failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-failure-log
          path: vitest.log
      - name: Verify formal syntax artifacts
        run: npm run grammar:formal-syntax-verify
      - name: Source adapter tests
        id: source_adapters
        shell: bash
        run: |
          set -o pipefail
          npm run test:source-adapters 2>&1 | tee source-adapters.log
      - name: Upload source adapter failure log
        if: failure() && steps.source_adapters.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: source-adapter-failure-log
          path: source-adapters.log
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Production build
        run: npm run build

  research:
    if: github.event_name == 'workflow_dispatch' && inputs.run_research
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Run archived research verification
        run: npm run check:research
