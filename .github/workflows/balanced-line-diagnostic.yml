name: balanced-line-diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/ultra-minimal-practice-ui

permissions:
  contents: read

jobs:
  balanced-line:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Capture typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balanced-line-typecheck
          path: typecheck.log
      - name: Enforce typecheck
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
      - name: Focused app tests
        run: npx vitest run tests/app/presentation-model.test.ts tests/app/keyboard-adapter.test.ts --reporter=verbose
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Production build
        run: npm run build
