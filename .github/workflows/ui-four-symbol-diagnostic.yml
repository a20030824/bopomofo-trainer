name: ui-four-symbol-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ui-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts
      - name: Typecheck
        run: npm run typecheck
      - name: Focused app tests
        run: npx vitest run tests/app/presentation-model.test.ts tests/app/keyboard-adapter.test.ts --reporter=verbose
      - name: Validate catalog
        run: npm run catalog:validate
      - name: Production build
        run: npm run build
